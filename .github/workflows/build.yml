name: build-binaries

# Costruisce i binari nativi "zero-Python" per Linux, macOS e Windows.
# Ogni sistema operativo va compilato sulla sua piattaforma: GitHub Actions
# lo fa in parallelo con una matrice. Gli artefatti sono scaricabili dalla
# pagina del run (e allegati alla release se lanciato su un tag v*).

on:
  workflow_dispatch:        # avvio manuale dalla tab Actions
  push:
    tags: ["v*"]            # oppure quando pubblichi un tag di versione

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: salva-linux-x86_64
            gui: salva-gui-linux-x86_64
          - os: macos-latest
            artifact: salva-macos-arm64
            gui: salva-gui-macos-arm64
          - os: windows-latest
            artifact: salva-windows-x86_64
            gui: salva-gui-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa PyInstaller
        run: python -m pip install --upgrade pyinstaller

      - name: Compila la CLI
        run: pyinstaller --onefile --name salva --paths . salva_main.py

      - name: Compila la GUI
        # Su Windows serve --windowed per non aprire una console accanto alla
        # finestra; su Linux/macOS l'app grafica parte senza console.
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            pyinstaller --onefile --windowed --name salva-gui --paths . salva_gui_main.py
          else
            pyinstaller --onefile --name salva-gui --paths . salva_gui_main.py
          fi

      - name: Rinomina con un nome unico per piattaforma
        # Necessario: Linux e macOS producono entrambi "salva"/"salva-gui";
        # senza un nome distinto i file collidono come asset della release.
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/salva.exe     "out/${{ matrix.artifact }}.exe"
            mv dist/salva-gui.exe "out/${{ matrix.gui }}.exe"
          else
            mv dist/salva     "out/${{ matrix.artifact }}"
            mv dist/salva-gui "out/${{ matrix.gui }}"
          fi

      - name: Smoke test del binario (Linux, headless)
        # Verifica che i binari nativi si AVVIINO davvero: la CLI risponde e la
        # GUI apre la finestra Tk sotto Xvfb, esegue un audit e si chiude.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq xvfb
          "out/${{ matrix.artifact }}" --version
          SALVA_GUI_SELFTEST=1 xvfb-run -a "out/${{ matrix.gui }}"

      - name: Carica gli artefatti
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/*

  release:
    # Allega i binari alla release quando si pusha un tag v*
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write        # necessario per creare la release e allegare i file
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Pubblica sulla release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
