name: build-binaries

# Costruisce i binari nativi "zero-Python" per Linux, macOS e Windows.
# Ogni sistema operativo va compilato sulla sua piattaforma: GitHub Actions
# lo fa in parallelo con una matrice. Gli artefatti sono scaricabili dalla
# pagina del run (e allegati alla release se lanciato su un tag v*).

on:
  workflow_dispatch:        # avvio manuale dalla tab Actions
  push:
    tags: ["v*"]            # oppure quando pubblichi un tag di versione

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: salva-linux-x86_64
            binary: salva
          - os: macos-latest
            artifact: salva-macos-arm64
            binary: salva
          - os: windows-latest
            artifact: salva-windows-x86_64
            binary: salva.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa PyInstaller
        run: python -m pip install --upgrade pyinstaller

      - name: Compila il binario
        run: pyinstaller --onefile --name salva --paths . salva_main.py

      - name: Carica l'artefatto
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}

  release:
    # Allega i binari alla release quando si pusha un tag v*
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write        # necessario per creare la release e allegare i file
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Pubblica sulla release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
